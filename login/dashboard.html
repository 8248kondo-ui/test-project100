<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>マイダッシュボード - TODO</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; display: flex; justify-content: center; padding: 20px; }
        .todo-box { background: white; padding: 2rem; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 400px; }
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        input[type="text"] { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 4px; }
        button { padding: 10px 15px; background: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; }
        ul { list-style: none; padding: 0; }
        li { background: #fff; border-bottom: 1px solid #eee; padding: 10px; display: flex; justify-content: space-between; align-items: center; }
        .delete-btn { background: #dc3545; font-size: 12px; padding: 5px 8px; }

        /* --- 追加したスタイル --- */
        .todo-item { display: flex; align-items: center; flex: 1; }
        .todo-text { margin-left: 10px; cursor: pointer; flex: 1; }
        .completed { text-decoration: line-through; color: #888; } /* 完了時に斜線を引く */
    </style>
</head>
<body>

<div class="todo-box">
    <h2>自分のTODOリスト</h2>
    <div class="input-group">
        <input type="text" id="todoInput" placeholder="新しいタスクを入力..." onkeypress="if(event.key==='Enter') addTodo()">
        <button onclick="addTodo()">追加</button>
    </div>
    <ul id="todoList"></ul>
    <hr>
    <button onclick="logout()" style="background:#6c757d;">ログアウト</button>
</div>

<script>
    function addTodo() {
        const input = document.getElementById('todoInput');
        const taskText = input.value.trim();
        if (!taskText) return;
        
        const todos = JSON.parse(localStorage.getItem('myTodos')) || [];
        
        // 修正ポイント：文字列ではなく「オブジェクト」で保存（完了状態を持たせるため）
        todos.push({ text: taskText, completed: false });
        
        localStorage.setItem('myTodos', JSON.stringify(todos));
        input.value = "";
        displayTodos();
    }

   function displayTodos() {
    const list = document.getElementById('todoList');
    const todos = JSON.parse(localStorage.getItem('myTodos')) || [];
    list.innerHTML = "";
    
    todos.forEach((todo, index) => {
        // データの形式をチェック（古い文字列データへの対策）
        const text = typeof todo === 'string' ? todo : todo.text;
        const isCompleted = todo.completed || false;

        const li = document.createElement('li');
        // 修正ポイント：${task} を ${text} に変更。
        // さらに、完了状態に応じて checked と class を付与。
        li.innerHTML = `
            <input type="checkbox" ${isCompleted ? 'checked' : ''} onclick="toggleTodo(${index})">
            <span class="todo-text ${isCompleted ? 'completed' : ''}">${text}</span>
            <button class="delete-btn" onclick="deleteTodo(${index})">削除</button>
        `;
        list.appendChild(li);
    });
}

    // 追加：完了・未完了を切り替える関数
    function toggleTodo(index) {
        const todos = JSON.parse(localStorage.getItem('myTodos')) || [];
        if (typeof todos[index] === 'string') {
            todos[index] = { text: todos[index], completed: true };
        } else {
            todos[index].completed = !todos[index].completed;
        }
        localStorage.setItem('myTodos', JSON.stringify(todos));
        displayTodos();
    }

    function deleteTodo(index) {
        const todos = JSON.parse(localStorage.getItem('myTodos')) || [];
        todos.splice(index, 1);
        localStorage.setItem('myTodos', JSON.stringify(todos));
        displayTodos();
    }

    function logout() {
        window.location.href = "login.html";
    }

    displayTodos();
</script>
</body>
</html>
