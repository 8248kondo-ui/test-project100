<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>マイダッシュボード - TODO</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; display: flex; justify-content: center; padding: 20px; }
        .todo-box { background: white; padding: 2rem; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 400px; }
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        input[type="text"] { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 4px; }
        .add-btn { padding: 10px 15px; background: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; }
        ul { list-style: none; padding: 0; }
        li { border-bottom: 1px solid #eee; padding: 10px; display: flex; justify-content: space-between; align-items: center; }
        .todo-item { display: flex; align-items: center; flex: 1; cursor: pointer; }
        .todo-text { margin-left: 10px; flex: 1; }
        .completed { text-decoration: line-through; color: #888; }
        .delete-btn { background: #dc3545; color: white; border: none; border-radius: 4px; font-size: 12px; padding: 5px 8px; cursor: pointer; }
        .logout-btn { background: #6c757d; color: white; border: none; border-radius: 4px; padding: 10px; cursor: pointer; width: 100%; margin-top: 20px; }
    </style>
</head>
<body>
<div class="todo-box">
    <h2>自分のTODOリスト</h2>
    <div class="input-group">
        <input type="text" id="todoInput" placeholder="新しいタスクを入力...">
        <button id="addBtn" class="add-btn">追加</button>
    </div>
    <ul id="todoList"></ul>
    <button id="logoutBtn" class="logout-btn">ログアウト</button>
</div>
<script src="todo.js"></script>
</body>
</html>
